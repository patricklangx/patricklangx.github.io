<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Calculator</title>
    <link rel="stylesheet" href="simple.css">
    <style>
        .calculator-container {
            padding: 2rem;
            background-color: var(--accent-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            border: var(--border-width) solid var(--border);
            border-radius: var(--standard-border-radius);
            background-color: var(--bg);
            color: var(--text);
        }

        input[type="number"]:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        button {
            width: 100%;
            margin-top: 1rem;
            padding: 0.75rem;
            font-size: 1.1rem;
        }

        h1 {
            text-align: center;
        }

        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .result-label {
            font-weight: bold;
        }

        .result-value {
            color: var(--accent);
            font-weight: bold;
        }

        .final-amount {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border);
            font-size: 1.4rem;
        }

        .final-amount .result-value {
            font-size: 1.6rem;
        }

        .calculators-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
            grid-column: 1 / -1;
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        @media only screen and (max-width: 1024px) {
            .calculators-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>Savings Calculator</h1>
    
    <div class="calculators-wrapper">
        <div>
            <h2>Future Value</h2>
            <div class="calculator-container">
                <div class="form-group">
                    <label for="initialCapital">Initial Capital:</label>
                    <input type="number" id="initialCapital" placeholder="0" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label for="monthlySavings">Monthly Savings:</label>
                    <input type="number" id="monthlySavings" placeholder="0" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label for="annualRate">Annual Interest Rate (% p.a.):</label>
                    <input type="number" id="annualRate" placeholder="0" min="0" max="100" step="0.01">
                </div>

                <div class="form-group">
                    <label for="years">Duration (Years):</label>
                    <input type="number" id="years" placeholder="0" min="0" step="1">
                </div>

                <button type="button" onclick="calculateSavings()">Calculate</button>

                <div id="resultBox" class="result-box">
                    <div class="result-row">
                        <span class="result-label">Initial Capital:</span>
                        <span class="result-value" id="resultInitial">0.00</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Total Contributions:</span>
                        <span class="result-value" id="resultContributions">0.00</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Interest Earned:</span>
                        <span class="result-value" id="resultInterest">0.00</span>
                    </div>
                    <div class="result-row final-amount">
                        <span class="result-label">Final Amount:</span>
                        <span class="result-value" id="resultFinal">0.00</span>
                    </div>
                </div>
            </div>
        </div>

        <div>
            <h2>Time to Goal</h2>
            <div class="calculator-container">
                <div class="form-group">
                    <label for="goalAmount">Target Amount:</label>
                    <input type="number" id="goalAmount" placeholder="0" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label for="initialCapital2">Initial Capital:</label>
                    <input type="number" id="initialCapital2" placeholder="0" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label for="monthlySavings2">Monthly Savings:</label>
                    <input type="number" id="monthlySavings2" placeholder="0" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label for="annualRate2">Annual Interest Rate (% p.a.):</label>
                    <input type="number" id="annualRate2" placeholder="0" min="0" max="100" step="0.01">
                </div>

                <button type="button" onclick="calculateTimeToGoal()">Calculate</button>

                <div id="resultBox2" class="result-box">
                    <div class="result-row">
                        <span class="result-label">Initial Capital:</span>
                        <span class="result-value" id="resultInitial2">0.00</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Goal Amount:</span>
                        <span class="result-value" id="resultGoal">0.00</span>
                    </div>
                    <div class="result-row final-amount">
                        <span class="result-label">Time to Goal:</span>
                        <span class="result-value" id="resultTime">0 years</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateSavings() {
            const initialCapital = parseFloat(document.getElementById('initialCapital').value) || 0;
            const monthlySavings = parseFloat(document.getElementById('monthlySavings').value) || 0;
            const annualRate = parseFloat(document.getElementById('annualRate').value) || 0;
            const years = parseFloat(document.getElementById('years').value) || 0;

            const monthlyRate = annualRate / 100 / 12;
            const months = years * 12;

            let finalAmount;
            
            if (monthlyRate === 0) {
                finalAmount = initialCapital + (monthlySavings * months);
            } else {
                const compoundFactor = Math.pow(1 + monthlyRate, months);
                const initialWithInterest = initialCapital * compoundFactor;
                const savingsWithInterest = monthlySavings * ((compoundFactor - 1) / monthlyRate);
                finalAmount = initialWithInterest + savingsWithInterest;
            }

            const totalContributions = initialCapital + (monthlySavings * months);
            const interestEarned = finalAmount - totalContributions;

            document.getElementById('resultInitial').textContent = formatCurrency(initialCapital);
            document.getElementById('resultContributions').textContent = formatCurrency(monthlySavings * months);
            document.getElementById('resultInterest').textContent = formatCurrency(interestEarned);
            document.getElementById('resultFinal').textContent = formatCurrency(finalAmount);
            
            document.getElementById('resultBox').classList.add('show');
        }

        function calculateTimeToGoal() {
            const initialCapital = parseFloat(document.getElementById('initialCapital2').value) || 0;
            const monthlySavings = parseFloat(document.getElementById('monthlySavings2').value) || 0;
            const annualRate = parseFloat(document.getElementById('annualRate2').value) || 0;
            const goalAmount = parseFloat(document.getElementById('goalAmount').value) || 0;

            if (goalAmount <= 0) {
                alert('Please enter a valid target amount');
                return;
            }

            if (goalAmount < initialCapital) {
                alert('Target amount must be greater than or equal to initial capital');
                return;
            }

            const monthlyRate = annualRate / 100 / 12;
            let months = 0;

            if (monthlyRate === 0) {
                if (monthlySavings === 0) {
                    if (goalAmount === initialCapital) {
                        months = 0;
                    } else {
                        alert('No interest and no monthly savings - goal cannot be reached');
                        return;
                    }
                } else {
                    months = (goalAmount - initialCapital) / monthlySavings;
                }
            } else {
                let amount = initialCapital;
                let maxIterations = 100000;
                let iteration = 0;

                while (amount < goalAmount && iteration < maxIterations) {
                    amount = amount * (1 + monthlyRate) + monthlySavings;
                    months++;
                    iteration++;
                }

                if (iteration >= maxIterations) {
                    alert('Goal cannot be reached with these parameters');
                    return;
                }
            }

            const years = months / 12;
            const years_int = Math.floor(years);
            const months_remaining = Math.round((years - years_int) * 12);

            let timeDisplay = '';
            if (years_int > 0) {
                timeDisplay += years_int + ' year' + (years_int !== 1 ? 's' : '');
            }
            if (months_remaining > 0) {
                if (timeDisplay) timeDisplay += ' ';
                timeDisplay += months_remaining + ' month' + (months_remaining !== 1 ? 's' : '');
            }
            if (!timeDisplay) {
                timeDisplay = '0 months';
            }

            document.getElementById('resultInitial2').textContent = formatCurrency(initialCapital);
            document.getElementById('resultGoal').textContent = formatCurrency(goalAmount);
            document.getElementById('resultTime').textContent = timeDisplay;
            
            document.getElementById('resultBox2').classList.add('show');
        }

        function formatCurrency(amount) {
            return amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                const activeId = document.activeElement.id;
                if (activeId.startsWith('initialCapital') && !activeId.includes('2')) {
                    calculateSavings();
                } else if (activeId.startsWith('initialCapital2') || activeId === 'monthlySavings2' || activeId === 'annualRate2' || activeId === 'goalAmount') {
                    calculateTimeToGoal();
                }
            }
        });
    </script>
</body>
</html>
